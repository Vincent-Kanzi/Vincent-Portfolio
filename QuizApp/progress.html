<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - MindSprint</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #a7c5c2;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 10px;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .dashboard-container {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 900px;
      width: 100%;
      overflow-x: auto;
    }

    h1 {
      text-align: center;
      color: #007bff;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #007bff;
      color: white;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    button {
      background: #007bff;
      border: none;
      border-radius: 8px;
      color: white;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 1em;
      margin-top: 20px;
    }

    button:hover {
      background: #0056b3;
    }

    @media (max-width: 600px) {
      th, td {
        padding: 8px;
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <h1>📊 MindSprint - Student Progress Dashboard</h1>
    <table id="progress-table">
      <thead>
        <tr>
          <th>Student</th>
          <th>Quiz Title</th>
          <th>Score</th>
          <th>Total</th>
          <th>Percentage</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button onclick="clearProgress()">Clear All Progress</button>
    <button onclick="window.location.href='admin.html'">Back to Admin</button>
  </div>

  <script>
    const tableBody = document.querySelector("#progress-table tbody");
    const progress = JSON.parse(localStorage.getItem("progress") || "[]");

    if (progress.length === 0) {
      tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;">No quiz attempts yet.</td></tr>`;
    } else {
      progress.forEach(entry => {
        const percent = ((entry.score / entry.total) * 100).toFixed(1);
        const row = `
          <tr>
            <td>${entry.username}</td>
            <td>${entry.quizTitle}</td>
            <td>${entry.score}</td>
            <td>${entry.total}</td>
            <td>${percent}%</td>
            <td>${entry.date}</td>
          </tr>
        `;
        tableBody.insertAdjacentHTML("beforeend", row);
      });
    }

    function clearProgress() {
      if (confirm("Are you sure you want to delete all progress?")) {
        localStorage.removeItem("progress");
        location.reload();
      }
    }
  </script>
</body>
</html>
