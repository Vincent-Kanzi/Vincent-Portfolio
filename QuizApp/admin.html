
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Quiz - Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container login-form">
    <h2>MindSprint Management</h2>
    <input type="text" id="quiz-title" placeholder="Quiz Title" />

    <div id="questions"></div>
    <button onclick="addQuestion()">Add Question</button>
    <button onclick="saveQuiz()">Save Quiz</button>
    <button onclick="window.location.href='viewQuizzes.html'">View All Quizzes</button>
    <button onclick="window.location.href='progress.html'">View Progress</button>
    
    <p><a href="index.html">Logout</a></p>
  </div>

  <script>
    let questions = [];

    function addQuestion() {
      const container = document.createElement("div");
      container.innerHTML = `
        <hr />
        <input type="text" placeholder="Question text" class="question-text" /><br />
        <input type="text" placeholder="Option A" class="option" />
        <input type="text" placeholder="Option B" class="option" />
        <input type="text" placeholder="Option C" class="option" />
        <input type="text" placeholder="Option D" class="option" />
        <input type="number" min="0" max="3" placeholder="Correct Option (0-3)" class="correct-index" />
      `;
      document.getElementById("questions").appendChild(container);
    }

    function saveQuiz() {
      const title = document.getElementById("quiz-title").value.trim();
      if (!title) return alert("Please enter quiz title");

      const questionContainers = document.querySelectorAll("#questions > div");
      const quiz = [];

      for (const container of questionContainers) {
        const question = container.querySelector(".question-text").value.trim();
        const options = Array.from(container.querySelectorAll(".option")).map(i => i.value.trim());
        const correct = parseInt(container.querySelector(".correct-index").value);

        if (!question || options.includes("") || isNaN(correct)) {
          alert("Fill out all fields correctly.");
          return;
        }

        quiz.push({ question, options, answer: correct });
      }

      // Save to localStorage
      const existingQuizzes = JSON.parse(localStorage.getItem("quizzes") || "{}");
      const username = localStorage.getItem("loggedInUser") || "anonymous";
      existingQuizzes[title] = { createdBy: username, quiz };
      localStorage.setItem("quizzes", JSON.stringify(existingQuizzes));

      alert("Quiz saved successfully!");
      document.getElementById("quiz-title").value = "";
      document.getElementById("questions").innerHTML = "";
    }
  </script>
</body>
</html>
