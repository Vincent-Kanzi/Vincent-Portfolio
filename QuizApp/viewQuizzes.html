<!DOCTYPE html>

  <style>
    /* General Page Setup */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(to bottom right, #e3f2fd, #ffffff);
  color: #333;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-y: auto;
}

/* Container */
.container {
  width: 100%;
  max-width: 900px;
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  margin-top: 20px;
  margin-bottom: 40px;
  animation: fadeIn 0.5s ease-in-out;
}

/* Title */
h2 {
  text-align: center;
  font-size: 1.8rem;
  color: #1976d2;
  margin-bottom: 20px;
}

/* Quiz Cards */
.quiz-card {
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 15px 20px;
  margin-bottom: 20px;
  background: #fafafa;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}

.quiz-card:hover {
  transform: scale(1.01);
  box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
}

.quiz-card h3 {
  margin-bottom: 8px;
  color: #1565c0;
}

.quiz-card p {
  line-height: 1.6;
  margin: 5px 0;
  font-size: 0.95rem;
}

/* Buttons */
button {
  cursor: pointer;
  border: none;
  border-radius: 8px;
  font-weight: 500;
  transition: background 0.2s ease;
}

/* Delete Button */
.delete-btn {
  background: #e53935;
  color: #fff;
  padding: 7px 12px;
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 0.85rem;
}

.delete-btn:hover {
  background: #c62828;
}

/* Back Button */
.back-btn {
  display: block;
  margin: 30px auto 0;
  padding: 12px 25px;
  background: #1976d2;
  color: #fff;
  font-size: 1rem;
  border-radius: 8px;
}

.back-btn:hover {
  background: #1565c0;
}

/* Scroll Behavior */
html {
  scroll-behavior: smooth;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive Design */
@media (max-width: 600px) {
  .container {
    padding: 15px;
    border-radius: 10px;
  }
  .quiz-card {
    padding: 12px;
  }
  h2 {
    font-size: 1.4rem;
  }
}

<body>
  <div class="container">
    <h2>Saved Quizzes</h2>
    <div id="quiz-list"></div>
    <button onclick="window.location.href='admin.html'">Back to Admin</button>
  </div>

  <script>
    function loadQuizzes() {
    const allQuizzes = JSON.parse(localStorage.getItem("quizzes") || "{}");
    const quizList = document.getElementById("quiz-list");
    quizList.innerHTML = ""; // clear list

    if (Object.keys(allQuizzes).length === 0) {
      quizList.innerHTML = "<p>No quizzes saved yet.</p>";
    } else {
      Object.keys(allQuizzes).forEach(title => {
        const quizCard = document.createElement("div");
        quizCard.className = "quiz-card";
        quizCard.innerHTML = `
          <button class="delete-btn" onclick="deleteQuiz('${title}')">Delete</button>
          <h3>${title}</h3>
          <p><b>Created by:</b> ${allQuizzes[title].createdBy || 'Unknown'}</p>
        `;

        allQuizzes[title].quiz.forEach((q, i) => {
          const p = document.createElement("p");
          p.innerHTML = `<b>Q${i + 1}:</b> ${q.question}<br>
                         Options: ${q.options.join(", ")}<br>
                         ✅ Correct Answer: ${q.options[q.answer]}`;
          quizCard.appendChild(p);
        });
        quizList.appendChild(quizCard);
      });
    }
  }

  function deleteQuiz(title) {
    if (confirm(`Are you sure you want to delete the quiz "${title}"?`)) {
      const allQuizzes = JSON.parse(localStorage.getItem("quizzes") || "{}");
      delete allQuizzes[title];
      localStorage.setItem("quizzes", JSON.stringify(allQuizzes));
      alert(`"${title}" has been deleted.`);
      loadQuizzes();
    }
  }

  // load quizzes on page load
  loadQuizzes();
